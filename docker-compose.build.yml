services:
  api:
    build: .
    image: budget-tracker-api:latest
    ports:
      - "8502:8502"
    volumes:
      - budget_data:/app/data
    networks:
      - budget-network

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: budget-tracker-dashboard:latest
    ports:
      - "8090:8080"
    environment:
      - BUDGET_API_URL=http://api:8502
    networks:
      - budget-network
    depends_on:
      - api

networks:
  budget-network:
    driver: bridge

volumes:
  budget_data:
    name: budget_data
