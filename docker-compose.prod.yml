services:
  api:
    image: mariox1105/budget-tracker-api:latest
    ports:
      - "8502:8502"
    volumes:
      - budget_data:/app/data
    restart: unless-stopped
    networks:
      - budget-network

  dashboard:
    image: mariox1105/budget-tracker-dashboard:latest
    ports:
      - "8090:8080"
    environment:
      - BUDGET_API_URL=http://api:8502
    restart: unless-stopped
    networks:
      - budget-network
    depends_on:
      - api

networks:
  budget-network:
    driver: bridge

volumes:
  budget_data:
    name: budget_data
    external: true
