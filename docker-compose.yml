services:
  api:
    image: mariox1105/budget-tracker-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8502:8502"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PENNY_MODEL=${PENNY_MODEL:-gpt-5.4}
    volumes:
      - budget_data:/app/data
    restart: unless-stopped
    networks:
      - budget-network

networks:
  budget-network:
    driver: bridge

volumes:
  budget_data:
    name: budget_data
    external: true
